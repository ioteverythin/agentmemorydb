name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Job 1: Lint & Format ───────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run ruff check
        run: ruff check app/ tests/
      - name: Run ruff format check
        run: ruff format --check app/ tests/

  # ── Job 2: Unit Tests (in-memory SQLite, no Docker needed) ─────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      # Match the DummyEmbeddingProvider(dim=8) used in conftest.py so
      # Vector(settings.embedding_dimension) doesn't reject 8-dim vectors.
      EMBEDDING_DIMENSION: "8"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests
        # Run ALL tests under tests/unit/ — not just those explicitly
        # marked @pytest.mark.unit (many tests lack the marker).
        run: pytest tests/unit/ -v --tb=short --asyncio-mode=auto

  # ── Job 3: Integration Tests (pgvector PostgreSQL) ─────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agentmem
          POSTGRES_PASSWORD: agentmem_secret
          POSTGRES_DB: agentmemorydb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentmem -d agentmemorydb_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql+asyncpg://agentmem:agentmem_secret@localhost:5432/agentmemorydb_test"
      ENVIRONMENT: test
      EMBEDDING_DIMENSION: "8"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run migrations
        run: alembic upgrade head
      - name: Run integration tests
        # Run ALL tests under tests/integration/ — not just those
        # explicitly marked @pytest.mark.integration.
        run: pytest tests/integration/ -v --tb=short --asyncio-mode=auto
